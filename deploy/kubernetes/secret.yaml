# TEMPLATE — DO NOT commit with real values filled in.
# Create this out-of-band with:
#
#   kubectl -n pier create secret generic pier-secrets \
#     --from-literal=PIER_MASTER_KEY="$(openssl rand -hex 32)" \
#     --from-literal=PIER_TOKENS="$(openssl rand -hex 24),$(openssl rand -hex 24)"
#
# Each comma-separated value in PIER_TOKENS is one device bearer token.
# Add one per machine that will sync from this Pier instance.
#
# This file is kept here only so `kubectl apply -f deploy/kubernetes/` works
# with the Kustomize overlay. Leave placeholders and use a sealed secret,
# SOPS, or kubectl create secret in real clusters.
apiVersion: v1
kind: Secret
metadata:
  name: pier-secrets
  namespace: pier
type: Opaque
stringData:
  PIER_MASTER_KEY: "CHANGE-ME-openssl-rand-hex-32-goes-here-must-be-64-chars-long-xx"
  PIER_TOKENS: "CHANGE-ME-openssl-rand-hex-24-goes-here"
