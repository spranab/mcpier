apiVersion: apps/v1
kind: Deployment
metadata:
  name: pier
  namespace: pier
  labels:
    app.kubernetes.io/name: pier
spec:
  replicas: 1
  strategy:
    type: Recreate  # single-replica + RWO PVC = can't RollingUpdate cleanly
  selector:
    matchLabels:
      app.kubernetes.io/name: pier
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pier
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: pier
          image: ghcr.io/spranab/mcpier:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8420
          envFrom:
            - configMapRef:
                name: pier-config
            - secretRef:
                name: pier-secrets
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pier-data
